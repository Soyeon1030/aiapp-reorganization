<div class="app">

  <!-- ═══════════ 좌측 글로벌 내비 ═══════════ -->
  <aside class="gnb" aria-label="글로벌 내비게이션">
    <button class="gnb__item" title="메뉴"><svg class="ph"><use href="#ph-list"/></svg></button>
    <button class="gnb__item" title="홈"><svg class="ph"><use href="#ph-house"/></svg></button>
    <button class="gnb__item is-active" title="AI 생성"><svg class="ph"><use href="#ph-magic-wand"/></svg></button>
    <button class="gnb__item" title="프로젝트"><svg class="ph"><use href="#ph-squares-four"/></svg></button>
    <button class="gnb__item" title="가이드"><svg class="ph"><use href="#ph-book-open"/></svg></button>
    <button class="gnb__item" title="결제"><svg class="ph"><use href="#ph-credit-card"/></svg></button>
    <span class="gnb__spacer"></span>
    <button class="gnb__item" title="알림">
      <svg class="ph"><use href="#ph-bell"/></svg>
      <!-- 미확인 알림이 있을 때만 노출 -->
      <i class="gnb__badge" hidden>1</i>
    </button>
    <span class="gnb__avatar">엠</span>
  </aside>

  <!-- ═══════════ 메인 ═══════════ -->
  <main class="main b1-bg">
    <div class="b1">

      <!-- 히어로 -->
      <header class="hero">
        <span class="hero__eyebrow"><svg class="ph"><use href="#ph-sparkle"/></svg> AI 에이전트 스튜디오</span>
        <h1 class="hero__title">어떤 <em class="hl">서비스</em>를 만들까요?</h1>
        <p class="hero__sub">아이디어 한 문장이면 충분해요. 기획부터 출시까지 AI가 만들어 드려요.</p>
      </header>

      <!-- 아이디어 컴포저 -->
      <section class="composer" aria-label="아이디어 입력">
        <!-- 가져온 프로젝트 토큰: 숏폼·로고 등 파생 작업 시 소스 프로젝트 표시.
             기본(웹사이트 만들기)에서는 이 rail이 비어 있음 -->
        <div class="composer__attach">
          <span class="attach-token">
            <span class="attach-token__avatar" style="background:#D98E4A">멍</span>
            멍멍 산책 예약
            <button class="attach-token__x" aria-label="가져온 프로젝트 제거">✕</button>
          </span>
        </div>
        <textarea class="composer__input" rows="3"
          placeholder="예) 동네 반려견 산책 대행을 예약할 수 있는 서비스"></textarea>
        <div class="composer__foot">
          <!-- 내가 만든 프로젝트를 소스로 가져오기 (클릭 → 프로젝트 선택 시트) -->
          <button class="chip"><svg class="ph"><use href="#ph-squares-four"/></svg> 내 프로젝트</button>
          <button class="chip"><svg class="ph"><use href="#ph-paperclip"/></svg> 로고·사진</button>
          <button class="chip"><svg class="ph"><use href="#ph-link"/></svg> 인스타·참고 링크</button>
          <!-- 확인 모드: 켜짐 상태는 .is-on -->
          <button class="chip is-on" aria-pressed="true"><span class="chip__switch"></span> 확인 모드</button>
          <button class="composer__send" title="생성 시작" aria-label="생성 시작" onclick="location.href='b2.html'">
            <svg class="ph"><use href="#ph-arrow-up"/></svg>
          </button>
        </div>
      </section>

      <!-- 작업 유형 선택 — 무엇을 만들지 고르는 칩 (기본: 웹사이트 만들기) -->
      <nav class="sugg" aria-label="작업 유형">
        <button class="sugg__chip is-on"><svg class="ph"><use href="#ph-globe"/></svg> 웹사이트 만들기</button>
        <button class="sugg__chip"><svg class="ph"><use href="#ph-palette"/></svg> 로고 만들기</button>
        <button class="sugg__chip"><svg class="ph"><use href="#ph-film-slate"/></svg> 숏폼 영상 만들기</button>
        <button class="sugg__chip"><svg class="ph"><use href="#ph-image"/></svg> 홍보 이미지 만들기</button>
      </nav>

      <!-- 내 프로젝트 -->
      <section class="proj" aria-label="내 프로젝트">
        <div class="proj__tabs">
          <div class="proj__tabs-main">
            <button class="proj__tab is-on">내 프로젝트</button>
            <button class="proj__tab">템플릿</button>
          </div>
          <div class="proj__tabs-sub">
            <button class="proj__filter is-on">전체</button>
            <button class="proj__filter">활성</button>
            <button class="proj__filter">초안</button>
          </div>
        </div>

        <div class="proj__grid">
          <article class="pcard">
            <div class="pcard__head">
              <span class="avatar" style="background:#43B96E">청검</span>
              <div class="pcard__id">
                <div class="pcard__title">청해 검수 pda 웹뷰</div>
                <div class="pcard__status"><i class="dot"></i> 출시됨 · 22시간 전</div>
              </div>
            </div>
            <span class="badge-url pcard__url">chungh….aiapp.link</span>
            <p class="pcard__desc">청해 검수 pda 웹뷰</p>
            <button class="btn btn--primary pcard__studio" onclick="location.href='b2.html'">스튜디오</button>
            <div class="pcard__acts">
              <button class="btn"><svg class="ph"><use href="#ph-database"/></svg> BaaS</button>
              <button class="btn btn--lite"><svg class="ph"><use href="#ph-globe"/></svg> 공개 설정</button>
            </div>
          </article>

          <article class="pcard">
            <div class="pcard__head">
              <span class="avatar" style="background:#E4574F">청물</span>
              <div class="pcard__id">
